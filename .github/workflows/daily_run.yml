name: Financial Market Monitor

on:
  # 允许手动触发运行
  workflow_dispatch: 
  
  # 定时任务触发
  schedule:
    # 1. 北京时间 07:30 (UTC 23:30)
    - cron: '30 23 * * *'
    
    # 2. 北京时间 12:00 (UTC 04:00)
    - cron: '0 4 * * *'
    
    # 3. 北京时间 15:30 (UTC 07:30)
    - cron: '30 7 * * *'
    
    # 4. 北京时间 21:00 (UTC 13:00)
    - cron: '0 13 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # ✨ 开启 pip 缓存，如果 requirements.txt 没变，安装速度会极大提升
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 💡 以后只需维护仓库里的 requirements.txt 即可
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Financial Monitor
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python main.py