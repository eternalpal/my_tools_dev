# 工作流名称（自定义）
name: 定时任务示例

# 触发规则：定时触发 + 手动触发（方便测试）
on:
  # 定时触发（cron表达式，时区是UTC，需转换为北京时间：UTC+8 → 北京时间8点 = UTC 0点）
  schedule:
    - cron: '0 0 * * *'  # 北京时间每天8点执行（UTC 0点）
  # 手动触发（在GitHub页面点击运行）
  workflow_dispatch:

# 任务执行配置
jobs:
  run-script:
    # 指定运行环境（GitHub提供的Ubuntu虚拟机）
    runs-on: ubuntu-latest
    # 步骤：安装依赖 → 执行脚本
    steps:
      # 步骤1：拉取当前仓库代码到虚拟机（必须步骤，否则无法访问仓库内的脚本）
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤2：设置Python环境（如果脚本是Python写的，需配置）
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 指定Python版本

      # 步骤3：安装依赖（如果脚本需要第三方库，比如requests）
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests  # 示例：安装requests

      # 步骤4：执行自定义脚本（核心逻辑）
      - name: 执行脚本
        run: python main.py  # 运行仓库中的main.py文件