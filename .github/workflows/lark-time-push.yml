name: 手动触发推送时间到飞书（隐私保护版）
on:
  workflow_dispatch:  # 手动触发配置
    inputs:
      name:
        description: '输入名字（可选）'
        required: false
        default: 'GitHub用户'

jobs:
  send-time-to-lark:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：打印基础信息（可选，便于调试）
      - name: 打印触发信息
        run: |
          echo "触发人：${{ github.actor }}"
          echo "输入名字：${{ github.event.inputs.name }}"
          echo "当前时间（UTC）：$(date)"

      # 步骤2：推送当前时间到飞书（使用Secrets存储Webhook URL）
      - name: 调用飞书Webhook推送时间
        run: |
          # 格式化时间（切换为北京时间）
          CURRENT_TIME=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          
          # 调用飞书Webhook（URL从Secrets读取，避免硬编码）
          curl -X POST \
            "${{ secrets.LARK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "🎉 手动触发成功！\n触发人：${{ github.event.inputs.name }}\n触发时间（北京时间）：'"$CURRENT_TIME"'\n运行详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            }'
        # 可选：失败重试（防止网络波动导致推送失败）
        continue-on-error: false  # 若推送失败，整个Job标记为失败
        timeout-minutes: 1        # 超时时间1分钟